<!DOCTYPE html>
<html>
<head>
<title>Tarun Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Tarun Calculator</h1>

<div class="tool">
<h2>EMI Calculator</h2>

Loan Amount:
<input type="number" id="loan"><br>

Interest Rate:
<input type="number" id="rate"><br>

Months:
<input type="number" id="months"><br>

<button onclick="calculateEMI()">Calculate</button>

<p id="emiResult"></p>

</div>


<div class="tool">
<h2>Age Calculator</h2>

<input type="date" id="dob">

<button onclick="calculateAge()">Calculate Age</button>

<p id="ageResult"></p>

</div>


<div class="tool">
<h2>GST Calculator</h2>

Amount:
<input type="number" id="amount">

GST %:
<input type="number" id="gst">

<button onclick="calculateGST()">Calculate GST</button>

<p id="gstResult"></p>

</div>


<script src="script.js"></script>

</body>
</html>
